---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: "choice"
        options:
          - "patch"
          - "minor"
          - "major"

permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"

concurrency:
  group: "release"
  cancel-in-progress: false

env:
  REGISTRY: "ghcr.io"
  IMAGE: "ghcr.io/${{ github.repository_owner }}/firemerge"

jobs:
  resolve-version:
    name: "Resolve version"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    outputs:
      tag: "${{ steps.bump.outputs.tag }}"
      version: "${{ steps.bump.outputs.version }}"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: "Verify branch"
        if: "github.ref_name != 'main'"
        run: |
          echo "::error::Releases must be triggered from the main branch"
          exit 1

      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Compute next version"
        id: "bump"
        env:
          BUMP: "${{ inputs.bump }}"
        run: |
          LATEST=$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | \
            sed 's/^v//' | sort -V | tail -n 1)

          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping $BUMP: ${LATEST:-0.0.0} -> $VERSION"

      - name: "Verify tag is available"
        env:
          TAG: "${{ steps.bump.outputs.tag }}"
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "::error::Tag $TAG already exists on remote"
            exit 1
          fi

  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c" # v4

      - name: "Build test image"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "."
          target: "test"
          push: false
          load: true
          tags: "firemerge:test"
          cache-from: "type=gha,scope=test"
          cache-to: "type=gha,scope=test,mode=max"

      - name: "Build frontend lint image"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "."
          target: "frontend-lint"
          push: false
          load: true
          tags: "firemerge:frontend-lint"
          cache-from: "type=gha,scope=frontend"
          cache-to: "type=gha,scope=frontend,mode=max"

      - name: "Run type checks"
        run: |
          docker run --rm --workdir /app/backend firemerge:test .venv/bin/mypy -p firemerge -p tests

      - name: "Run tests"
        run: |
          docker run --rm --workdir /app/backend firemerge:test .venv/bin/pytest -vv

      - name: "Run frontend lint"
        run: |
          docker run --rm --workdir /app/frontend firemerge:frontend-lint npx eslint .

      - name: "Run frontend type check"
        run: |
          docker run --rm --workdir /app/frontend firemerge:frontend-lint npx tsc --noEmit --project tsconfig.app.json

  release:
    name: "Build, push, and release"
    needs:
      - "resolve-version"
      - "test"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Capture previous tag"
        id: "prev"
        run: |
          PREV_TAG=$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | \
            awk '{ n=$0; gsub(/^v/,"",n); print n" "$0 }' | sort -k1,1 -V | \
            awk '{print $2}' | tail -n 1)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c" # v4

      - name: "Login to GHCR"
        uses: "docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee" # v4
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9" # v6
        with:
          images: "${{ env.IMAGE }}"
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.tag }}
            type=raw,value=latest

      - name: "Build image"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "."
          push: false
          load: true
          tags: "firemerge:release"
          cache-from: "type=gha,scope=prod"
          cache-to: "type=gha,scope=prod,mode=max"

      - name: "Push image"
        id: "push"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "."
          platforms: "linux/amd64"
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          cache-from: "type=gha,scope=prod"
          cache-to: "type=gha,scope=prod,mode=max"
          sbom: true
          provenance: "mode=max"

      # BuildKit provenance (in-toto) + Sigstore attestation for defense-in-depth
      - name: "Generate provenance attestation"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4
        with:
          subject-name: "${{ env.IMAGE }}"
          subject-digest: "${{ steps.push.outputs.digest }}"
          push-to-registry: true

      - name: "Create git tag"
        env:
          TAG: "${{ needs.resolve-version.outputs.tag }}"
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: "Generate release notes"
        id: "notes"
        env:
          TAG: "${{ needs.resolve-version.outputs.tag }}"
          VERSION: "${{ needs.resolve-version.outputs.version }}"
          DIGEST: "${{ steps.push.outputs.digest }}"
          IMAGE: "${{ env.IMAGE }}"
          SHA: "${{ github.sha }}"
          RUN_NUMBER: "${{ github.run_number }}"
          RUN_ID: "${{ github.run_id }}"
          SERVER_URL: "${{ github.server_url }}"
          REPO: "${{ github.repository }}"
        run: |
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          {
            echo 'RELEASE_NOTES<<NOTES_EOF'

            # shellcheck disable=SC2016
            printf '`%s:%s`\n' "${IMAGE}" "${VERSION}"
            # shellcheck disable=SC2016
            printf '`%s`\n\n' "${DIGEST}"
            printf '```bash\n'
            printf 'docker pull %s:%s\n' "${IMAGE}" "${VERSION}"
            printf '```\n\n'
            printf '**Commit:** %s | **Run:** [#%s](%s/%s/actions/runs/%s)\n\n' \
              "${SHA}" "${RUN_NUMBER}" "${SERVER_URL}" "${REPO}" "${RUN_ID}"
            printf '### Changes\n\n'
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' --no-merges
            else
              printf '- Initial release\n'
            fi
            printf '\n'

            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAG: "${{ needs.resolve-version.outputs.tag }}"
        run: |
          gh release create "$TAG" \
            --title "FireMerge $TAG" \
            --notes "${RELEASE_NOTES}"
