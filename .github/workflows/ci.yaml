# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
# See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments

name: "CI"
on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
permissions:
  actions: "write"
  contents: "write"
  pull-requests: "write"
  security-events: "write"
  statuses: "write"
jobs:
  changes:
    name: "Detect changes"
    runs-on: "ubuntu-latest"
    timeout-minutes: 2
    outputs:
      app: "${{ steps.filter.outputs.app }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Check paths"
        id: "filter"
        uses: "dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d" # v4.0.1
        with:
          filters: |
            app:
              - 'backend/**'
              - 'frontend/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'docker-compose.yml'
              - '.trivyignore.yaml'
              - 'trivy.yaml'
  lint:
    uses: "anthony-spruyt/repo-operator/.github/workflows/_lint.yaml@main"
    secrets: "inherit"
  build:
    name: "Build, test, and scan"
    needs: "changes"
    if: "needs.changes.outputs.app == 'true'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    concurrency:
      group: "${{ github.workflow }}-build-${{ github.ref }}"
      cancel-in-progress: "${{ github.event_name == 'pull_request' }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4

      - name: "Build test image"
        uses: "docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f" # v7
        with:
          context: "."
          target: "test"
          push: false
          load: true
          tags: "firemerge:test"
          cache-from: "type=gha,scope=test"
          cache-to: "type=gha,scope=test,mode=max"

      - name: "Build frontend lint image"
        uses: "docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f" # v7
        with:
          context: "."
          target: "frontend-lint"
          push: false
          load: true
          tags: "firemerge:frontend-lint"
          cache-from: "type=gha,scope=frontend"
          cache-to: "type=gha,scope=frontend,mode=max"

      - name: "Run type checks"
        run: |
          docker run --rm --workdir /app/backend firemerge:test .venv/bin/mypy -p firemerge -p tests

      - name: "Run tests"
        run: |
          docker run --rm --workdir /app/backend firemerge:test .venv/bin/pytest -vv

      - name: "Run frontend lint"
        run: |
          docker run --rm --workdir /app/frontend firemerge:frontend-lint npx eslint .

      - name: "Run frontend type check"
        run: |
          docker run --rm --workdir /app/frontend firemerge:frontend-lint npx tsc --noEmit --project tsconfig.app.json

      - name: "Build production image"
        uses: "docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f" # v7
        with:
          context: "."
          push: false
          load: true
          tags: "firemerge:ci"
          cache-from: |
            type=gha,scope=prod
            type=gha,scope=test
          cache-to: "type=gha,scope=prod,mode=max"

      - name: "Smoke test"
        run: |
          docker run --rm firemerge:ci .venv/bin/python -c "from firemerge.main import serve_web"

      - name: "Scan for vulnerabilities"
        uses: "anthony-spruyt/repo-operator/.github/actions/trivy-scan@main"
        with:
          image-ref: "firemerge:ci"
          trivyignores: ".trivyignore.yaml"
          category: "trivy"
  summary:
    needs:
      - "changes"
      - "lint"
      - "build"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
